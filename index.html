  { id:"orig_screenplay", name:"Best Original Screenplay", emoji:"✍️", nominees:["Blue Moon — Robert Kaplow","It Was Just an Accident — Jafar Panahi et al.","Marty Supreme — Bronstein & Safdie","Sentimental Value — Vogt & Trier","Sinners — Ryan Coogler"] },
  { id:"adapt_screenplay", name:"Best Adapted Screenplay", emoji:"✍️", nominees:["Bugonia — Will Tracy","Frankenstein — Guillermo del Toro","Hamnet — Zhao & O'Farrell","One Battle After Another — Paul Thomas Anderson","Train Dreams — Bailey & Kwedar"] },

  { id:"sound", name:"Best Sound", emoji:"🔊", nominees:["F1","Frankenstein","One Battle After Another","Sinners","Sirât"] },
  { id:"vfx", name:"Best Visual Effects", emoji:"✨", nominees:["Avatar: Fire and Ash","F1","Jurassic World Rebirth","The Lost Bus","Sinners"] },
  { id:"short_live", name:"Best Live Action Short", emoji:"🎞️", nominees:["Butcher's Stain","A Friend of Dorothy","Jane Austen's Period Drama","The Singers","Two People Exchanging Saliva"] },

// ─── Achievements ─────────────────────────────────────────────────────────────
const ACHIEVEMENTS = [
  {
    id:"oracle", icon:"🔮", name:"Oracle of Hollywood",
    desc:"Got 18+ categories correct — you basically work for PricewaterhouseCoopers",
    check:(nick,ap,w)=>Object.entries(w).filter(([c,v])=>(ap[nick]||{})[c]===v).length>=18
  },
  {
    id:"snubbed", icon:"😭", name:"Snubbed Again",
    desc:"Finished with 0 correct — the Academy has betrayed you personally",
    check:(nick,ap,w)=>Object.keys(w).length>=10&&Object.entries(w).filter(([c,v])=>(ap[nick]||{})[c]===v).length===0
  },
  {
    id:"nordic", icon:"🇳🇴", name:"Scandinavian Conspiracy",
    desc:"Picked Sentimental Value to win 3+ categories — Trier's biggest fan in the room",

  {

    check:(nick,ap,w,us,cats)=>{ const cc=cats.filter(c=>c.nominees.some(n=>n.includes("Sinners"))); return cc.length>0&&cc.every(c=>(ap[nick]||{})[c.id]?.includes("Sinners")); }
  },
  {
    id:"typeA", icon:"📋", name:"Type A Personality",
    desc:"Submitted all 24 predictions before lock — you take this way too seriously (we respect it)",
    check:(nick,ap,w,us,cats)=>Object.keys(ap[nick]||{}).length===cats.length
  },
  {
    id:"darkhorse", icon:"🐴", name:"Dark Horse Whisperer",
    desc:"Correctly called a winner that literally nobody else picked — psychic powers confirmed",
    check:(nick,ap,w,users)=>Object.entries(w).some(([cat,win])=>(ap[nick]||{})[cat]===win&&users.filter(u=>u.nickname!==nick).every(u=>(ap[u.nickname]||{})[cat]!==win))
  },
  {
    id:"champion", icon:"👑", name:"This Is My Oscar",
    desc:"Finished #1 on the leaderboard — collect your statue",
    check:(nick,ap,w,users)=>{ if(Object.keys(w).length<5)return false; const my=Object.entries(w).filter(([c,v])=>(ap[nick]||{})[c]===v).length; return users.every(u=>Object.entries(w).filter(([c,v])=>(ap[u.nickname]||{})[c]===v).length<=my); }
  },
  {
    id:"pta", icon:"🎬", name:"PTA Superfan",
    desc:"Bet on 'One Battle After Another' in 4+ categories — you've read all the IndieWire think-pieces",
    check:(nick,ap)=>Object.values(ap[nick]||{}).filter(v=>v?.includes("One Battle After Another")).length>=4
  },
  {
    id:"acting_coach", icon:"🎭", name:"The Acting Coach",
    desc:"Correctly predicted both Best Actor and Best Actress in the same year",
    check:(nick,ap,w)=>!!(w.actor&&w.actress&&(ap[nick]||{}).actor===w.actor&&(ap[nick]||{}).actress===w.actress)
  },
  {
    id:"fashionista", icon:"👗", name:"On The Red Carpet",
    desc:"Nailed both Best Costume Design and Best Production Design — a true aesthete",
    check:(nick,ap,w)=>!!(w.costume&&w.production&&(ap[nick]||{}).costume===w.costume&&(ap[nick]||{}).production===w.production)
  },
];

// ─── Film extraction ──────────────────────────────────────────────────────────
const getFilm = (catId, nominee) => {
  const personFirst = ["actor","actress","supp_actor","supp_actress","director"];
  if (personFirst.includes(catId)) return nominee.split(" — ")[1] || nominee;
  if (catId === "score") return nominee.split(" — ")[0];
  if (catId === "song") return (nominee.match(/— (.+)$/) || [])[1]?.trim() || nominee;
  if (["orig_screenplay","adapt_screenplay"].includes(catId)) return nominee.split(" — ")[0];
  if (catId === "intl") return nominee.split(" (")[0];
  return nominee;
};

// ─── PIN hash ─────────────────────────────────────────────────────────────────
const hashPin = (nick, pin) => btoa(`${nick.toLowerCase().trim()}:${pin}:oscars2026`).replace(/=/g,"");

// ─── Firebase storage helpers ─────────────────────────────────────────────────
const st = {
  async get(key) {
    try {
      const doc = await db.collection("oscars").doc(key).get();
      if (!doc.exists) return null;
      return JSON.parse(doc.data().value);
    } catch(e) { console.warn("st.get error", key, e); return null; }
  },
  async set(key, val) {
    try {
      await db.collection("oscars").doc(key).set({ value: JSON.stringify(val), updatedAt: new Date().toISOString() });
    } catch(e) { console.warn("st.set error", key, e); }
  },
  async del(key) {
    try {
      await db.collection("oscars").doc(key).delete();
    } catch(e) { console.warn("st.del error", key, e); }
  }
};

// ─── Input style ──────────────────────────────────────────────────────────────
const inp = {
  background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.12)",
  borderRadius: 10, padding: "13px 16px", fontSize: 15, color: "#fff",
  width: "100%", fontFamily: "'Inter', sans-serif",
};

// ═══════════════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [view, setView] = useState("login");
  const [user, setUser] = useState(null);
  const [loginForm, setLoginForm] = useState({ nickname:"", pin:"" });
  const [isReg, setIsReg] = useState(false);
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const [predictions, setPredictions] = useState({});
  const [allPreds, setAllPreds] = useState({});
  const [winners, setWinners] = useState({});
  const [users, setUsers] = useState([]);
  const [historyData, setHistoryData] = useState([]);
  const [now, setNow] = useState(new Date());

  const isLocked = now >= LOCK_TIME;

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const loadShared = async () => {
    const [w, u, h] = await Promise.all([
      st.get(`winners_${YEAR}`), st.get("osc_users"), st.get("osc_history")
    ]);
    const ul = u || [];
    setWinners(w || {});
    setUsers(ul);
    setHistoryData(h || []);
    return ul;
  };

  const loadPredictions = async (usersList, myNick) => {
    const entries = await Promise.all(
      (usersList || []).map(async u => [u.nickname, await st.get(`preds_${YEAR}_${u.nickname}`)])
    );
    const all = Object.fromEntries(entries.map(([n,p]) => [n, p || {}]));
    setAllPreds(all);
    if (myNick) setPredictions(all[myNick] || {});
    return all;
  };

  // Real-time listener for winners (live during ceremony!)
  useEffect(() => {
    if (!user) return;
    const unsub = db.collection("oscars").doc(`winners_${YEAR}`).onSnapshot(doc => {
      if (doc.exists) {
        try { setWinners(JSON.parse(doc.data().value)); } catch {}
      }
    });
    return () => unsub();
  }, [user]);

  // Poll predictions every 20s — stops after lock time (winners use realtime onSnapshot)
  useEffect(() => {
    if (!user || isLocked) return;
    const t = setInterval(async () => {
      if (new Date() >= LOCK_TIME) { clearInterval(t); return; }
      const ul = await st.get("osc_users") || [];
      setUsers(ul);
      await loadPredictions(ul, user.nickname);
    }, 20000);
    return () => clearInterval(t);
  }, [user, isLocked]);

  const handleAuth = async () => {
    setError("");
    const { nickname, pin } = loginForm;
    if (!nickname.trim() || pin.length < 4) { setError("Need a nickname and 4-digit PIN"); return; }
    setLoading(true);
    const currentUsers = await st.get("osc_users") || [];
    const nick = nickname.trim();
    const existing = currentUsers.find(u => u.nickname.toLowerCase() === nick.toLowerCase());

    if (isReg) {
      if (existing) { setError("Nickname already taken"); setLoading(false); return; }
      if (currentUsers.length >= 20) { setError("Group is full (max 20 players)"); setLoading(false); return; }
      const newUser = { nickname: nick, pinHash: hashPin(nick, pin), isAdmin: currentUsers.length === 0, joinedAt: new Date().toISOString() };
      const updated = [...currentUsers, newUser];
      await st.set("osc_users", updated);
      await st.set(`preds_${YEAR}_${nick}`, {});
      setUsers(updated);
      await loadPredictions(updated, nick);
      await loadShared();
      setUser({ nickname: nick, isAdmin: newUser.isAdmin });
      setView("ballot");
    } else {
      if (!existing) { setError("User not found — register first"); setLoading(false); return; }
      if (existing.pinHash !== hashPin(nick, pin)) { setError("Wrong PIN, try again"); setLoading(false); return; }
      const ul = await loadShared();
      await loadPredictions(ul, existing.nickname);
      setUser({ nickname: existing.nickname, isAdmin: existing.isAdmin });
      setView("ballot");
    }
    setLoading(false);
  };

  const pick = async (catId, nominee) => {
    if (isLocked) return;
    const updated = { ...predictions, [catId]: nominee };
    setPredictions(updated);
    setAllPreds(prev => ({ ...prev, [user.nickname]: updated }));
    await st.set(`preds_${YEAR}_${user.nickname}`, updated);
  };

  const markWinner = async (catId, nominee) => {
    const updated = { ...winners };
    if (nominee === null) delete updated[catId];
    else updated[catId] = nominee;
    setWinners(updated);
    await st.set(`winners_${YEAR}`, updated);
  };

  const renameUser = async (oldNick, newNick, newPin) => {
    if (users.some(u => u.nickname.toLowerCase() === newNick.toLowerCase() && u.nickname !== oldNick)) {
      throw new Error("Nickname already taken");
    }
    const preds = await st.get(`preds_${YEAR}_${oldNick}`) || {};
    const updatedUsers = users.map(u =>
      u.nickname === oldNick ? { ...u, nickname: newNick, pinHash: hashPin(newNick, newPin) } : u
    );
    await st.set("osc_users", updatedUsers);
    await st.set(`preds_${YEAR}_${newNick}`, preds);
    await st.del(`preds_${YEAR}_${oldNick}`);
    if (historyData && historyData.length > 0) {
      const updatedHistory = historyData.map(entry => ({
        ...entry,
        scores: entry.scores.map(s => s.nickname === oldNick ? { ...s, nickname: newNick } : s)
      }));
      await st.set("osc_history", updatedHistory);
      setHistoryData(updatedHistory);
    }
    setUsers(updatedUsers);
    const newAllPreds = { ...allPreds, [newNick]: preds };
    delete newAllPreds[oldNick];
    setAllPreds(newAllPreds);
    if (user.nickname === oldNick) {
      setUser(prev => ({ ...prev, nickname: newNick }));
      setPredictions(preds);
    }
  };

  const deleteUser = async (nick) => {
    const updatedUsers = users.filter(u => u.nickname !== nick);
    await st.set("osc_users", updatedUsers);
    await st.del(`preds_${YEAR}_${nick}`);
    setUsers(updatedUsers);
    const newAllPreds = { ...allPreds };
    delete newAllPreds[nick];
    setAllPreds(newAllPreds);
  };

  const deleteHistoryYear = async (yr) => {
    const updated = (historyData || []).filter(h => h.year !== yr);
    await st.set("osc_history", updated);
    setHistoryData(updated);
  };

  const calcScore = (nick) =>
    Object.entries(winners).filter(([c,w]) => (allPreds[nick] || {})[c] === w).length;

  const countdown = () => {
    const diff = LOCK_TIME - now;
    if (diff <= 0) return "🔒 Locked — ceremony is live!";
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    if (d > 0) return `Locks in ${d}d ${h}h ${m}m`;
    return `Locks in ${h}h ${m}m ${s}s`;
  };

  // ── LOGIN SCREEN ────────────────────────────────────────────────────────────
  if (view === "login") return (
    <div style={{minHeight:"100vh",background:DARK,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center"}}>
      <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(100,80,180,0.05) 0%, transparent 60%)",pointerEvents:"none"}} />
      <div className="fade-up" style={{padding:"0 28px",width:"100%",maxWidth:380,position:"relative"}}>
        <div style={{textAlign:"center",marginBottom:48}}>
          <div style={{fontSize:60,marginBottom:12,lineHeight:1}}>🏆</div>
          <div style={{fontSize:38,fontWeight:700,color:GOLD,letterSpacing:"0.15em",lineHeight:1,fontFamily:"'Cormorant Garamond', serif"}}>OSCARS</div>
          <div style={{fontSize:22,fontWeight:400,color:GOLD2,letterSpacing:"0.3em",opacity:0.8,marginTop:2,fontFamily:"'Cormorant Garamond', serif"}}>2026</div>
          <div style={{width:60,height:1,background:`linear-gradient(90deg, transparent, ${GOLD}, transparent)`,margin:"14px auto"}} />
          <div style={{fontSize:13,color:"rgba(255,255,255,0.35)",letterSpacing:"0.05em"}}>Prediction Challenge · 98th Academy Awards</div>
        </div>

        <div className="fade-up-1" style={{display:"flex",background:"rgba(255,255,255,0.04)",borderRadius:12,padding:3,marginBottom:20,border:"1px solid rgba(255,255,255,0.08)"}}>
          {["Sign In","Register"].map((label,i) => (
            <button key={i} onClick={() => { setIsReg(i===1); setError(""); }}
              style={{flex:1,padding:"10px",border:"none",borderRadius:10,cursor:"pointer",fontWeight:600,fontSize:14,fontFamily:"'Inter', sans-serif",transition:"all 0.25s",
                background:isReg===(i===1)?`linear-gradient(135deg, ${GOLD}, #a07828)`:"transparent",
                color:isReg===(i===1)?"#0a0a14":"rgba(255,255,255,0.4)"}}>
              {label}
            </button>
          ))}
        </div>

        <div className="fade-up-2" style={{display:"flex",flexDirection:"column",gap:12}}>
          <input style={inp} placeholder="Your nickname" value={loginForm.nickname}
            onChange={e => setLoginForm(f=>({...f,nickname:e.target.value}))}
            onKeyDown={e => e.key==="Enter" && handleAuth()} />
          <input style={inp} placeholder="4-digit PIN" type="password" inputMode="numeric" maxLength={8}
            value={loginForm.pin} onChange={e => setLoginForm(f=>({...f,pin:e.target.value}))}
            onKeyDown={e => e.key==="Enter" && handleAuth()} />

          {error && <div style={{color:"#ff8080",fontSize:13,textAlign:"center",padding:"2px 0"}}>{error}</div>}

          <button onClick={handleAuth} disabled={loading}
            style={{background:`linear-gradient(135deg, ${GOLD} 0%, #a07828 100%)`,color:"#070710",border:"none",borderRadius:12,padding:"14px",fontSize:16,fontWeight:700,cursor:"pointer",marginTop:4,opacity:loading?0.7:1,fontFamily:"'Cormorant Garamond', serif",letterSpacing:"0.08em",transition:"opacity 0.2s"}}>

          Predictions lock March 15, 2026 at 7 PM ET
        </div>
      </div>

  );

  // ── MAIN SHELL ──────────────────────────────────────────────────────────────

    {id:"leaderboard",label:"Board",icon:"📊"},
    {id:"stats",label:"Stats",icon:"🎬"},
    {id:"awards",label:"Wrap",icon:"🏅"},
    ...(user?.isAdmin ? [{id:"admin",label:"Admin",icon:"⚙️"}] : []),
    {id:"history",label:"History",icon:"📅"},

  return (
    <div style={{minHeight:"100vh",background:DARK,color:"#fff",fontFamily:"'Inter', sans-serif",maxWidth:480,margin:"0 auto",paddingBottom:70}}>

      <div className="fade-in" key={view}>
        {view==="ballot"      && <BallotView categories={CATEGORIES} predictions={predictions} onPick={pick} winners={winners} isLocked={isLocked} />}
        {view==="leaderboard" && <LeaderboardView users={users} allPreds={allPreds} winners={winners} calcScore={calcScore} myNick={user?.nickname} totalCats={CATEGORIES.length} />}

// BALLOT VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function BallotView({ categories, predictions, onPick, winners, isLocked }) {
  const done = Object.keys(predictions).length, total = categories.length;
  return (
    <div>
      {isLocked && (
        <div style={{background:"linear-gradient(135deg, #8b0000, #5c0000)",padding:"10px 16px",textAlign:"center",fontSize:13,fontWeight:600,letterSpacing:"0.05em"}}>
          🔒 Predictions are locked — the ceremony is live!
        </div>
      )}
      <div style={{padding:"14px 18px 6px"}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:7,letterSpacing:"0.05em",fontWeight:500}}>
          <span>YOUR PROGRESS</span>
          <span style={{color:done===total?"#6be89a":GOLD}}>{done} / {total}</span>
        </div>
        <div style={{height:3,background:"rgba(255,255,255,0.06)",borderRadius:6,overflow:"hidden"}}>
          <div style={{width:`${(done/total)*100}%`,height:"100%",background:`linear-gradient(90deg, ${GOLD}, #6be89a)`,borderRadius:6,transition:"width 0.4s ease"}} />
        </div>
      </div>

      {categories.map(cat => {
        const myPick = predictions[cat.id], winner = winners[cat.id];
        const gotRight = myPick && winner && myPick===winner;
        const gotWrong = myPick && winner && myPick!==winner;
        return (
          <div key={cat.id} style={{margin:"8px 14px",background:CARD2,borderRadius:14,border:`1px solid ${gotRight?"rgba(107,232,154,0.3)":gotWrong?"rgba(255,100,100,0.15)":BORDER}`,overflow:"hidden"}}>
            <div style={{padding:"12px 14px 8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:15}}>{cat.emoji}</span>
                <span style={{fontSize:15,fontWeight:600,color:GOLD,fontFamily:"'Cormorant Garamond', serif",letterSpacing:"0.02em"}}>{cat.name}</span>
              </div>
              {gotRight && <span style={{fontSize:11,color:"#6be89a",fontWeight:600}}>✓ Correct!</span>}
              {gotWrong && <span style={{fontSize:11,color:"#ff7070"}}>✗ Missed</span>}
            </div>
            <div style={{padding:"0 10px 10px",display:"flex",flexDirection:"column",gap:5}}>
              {cat.nominees.map(nom => {
                const isMyPick=myPick===nom, isWinner=winner===nom;
                let bg="rgba(255,255,255,0.03)", border="rgba(255,255,255,0.07)", textColor="rgba(255,255,255,0.55)", icon="○";
                if (isWinner)     { bg="rgba(201,168,76,0.12)"; border="rgba(201,168,76,0.4)";   textColor="#fff";     icon="🏆"; }
                else if (isMyPick){ bg="rgba(80,100,220,0.15)"; border="rgba(120,140,255,0.35)"; textColor="#c5cbff"; icon="●"; }
                return (
                  <button key={nom} className="btn-pick" onClick={() => onPick(cat.id,nom)}
                    disabled={isLocked || !!winner}
                    style={{background:bg,border:`1px solid ${border}`,borderRadius:9,padding:"9px 12px",textAlign:"left",cursor:(isLocked||winner)?"default":"pointer",display:"flex",alignItems:"center",gap:10,width:"100%"}}>
                    <span style={{fontSize:14,width:18,textAlign:"center",flexShrink:0,lineHeight:1}}>{icon}</span>
                    <span style={{fontSize:13,color:textColor,fontWeight:(isMyPick||isWinner)?600:400,lineHeight:1.35}}>{nom}</span>
                  </button>
                );
              })}
            </div>
          </div>
        );
      })}
      <div style={{height:16}} />
    </div>
  );
}

// LEADERBOARD VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function LeaderboardView({ users, allPreds, winners, calcScore, myNick, totalCats }) {
  const totalWinners = Object.keys(winners).length;
  const sorted = [...users].sort((a,b) => calcScore(b.nickname)-calcScore(a.nickname));
  const MEDALS = ["🥇","🥈","🥉"];
  return (
    <div>
      <div style={{margin:"14px 14px 10px",background:`linear-gradient(135deg, ${CARD2}, #0a0a1a)`,borderRadius:16,padding:"22px 24px",border:`1px solid ${BORDER}`,textAlign:"center"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:"0.1em",fontWeight:500}}>OSCARS AWARDED</div>
        <div style={{fontSize:52,fontWeight:700,color:GOLD,lineHeight:1.1,marginTop:6,fontFamily:"'Cormorant Garamond', serif"}}>{totalWinners}</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,0.3)"}}>of {totalCats} categories</div>
        <div style={{marginTop:14,height:3,background:"rgba(255,255,255,0.06)",borderRadius:6,overflow:"hidden"}}>
          <div style={{width:`${(totalWinners/totalCats)*100}%`,height:"100%",background:`linear-gradient(90deg, ${GOLD}, #6be89a)`,borderRadius:6,transition:"width 0.6s ease"}} />
        </div>
      </div>

      {sorted.map((u,i) => {
        const s = calcScore(u.nickname), isMe = u.nickname===myNick;
        const predCount = Object.keys(allPreds[u.nickname]||{}).length;
        const pct = totalWinners>0?(s/totalWinners)*100:0;
        return (
          <div key={u.nickname} style={{margin:"6px 14px",background:isMe?`linear-gradient(135deg, rgba(201,168,76,0.08), rgba(201,168,76,0.03))`:CARD2,borderRadius:14,padding:"14px 16px",border:`1px solid ${isMe?"rgba(201,168,76,0.35)":"rgba(255,255,255,0.06)"}`}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{fontSize:i<3?28:14,width:34,textAlign:"center",color:i>=3?"rgba(255,255,255,0.25)":undefined,fontWeight:700}}>{i<3?MEDALS[i]:`${i+1}`}</div>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                  <span style={{fontWeight:600,fontSize:14,color:isMe?GOLD:"#e8e8e8"}}>{u.nickname}{isMe?" (you)":""}{u.isAdmin?" 👑":""}</span>
                  <span style={{fontSize:20,fontWeight:700,color:GOLD,fontFamily:"'Cormorant Garamond', serif"}}>
                    {s}<span style={{fontSize:12,color:"rgba(255,255,255,0.3)",fontFamily:"'Inter'",fontWeight:400}}>/{totalWinners||"?"}</span>
                  </span>
                </div>
                <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:6,overflow:"hidden"}}>
                  <div style={{width:`${pct}%`,height:"100%",background:isMe?`linear-gradient(90deg, ${GOLD}, #6be89a)`:"linear-gradient(90deg, #555, #777)",borderRadius:6,transition:"width 0.6s ease"}} />
                </div>
                <div style={{fontSize:10.5,color:"rgba(255,255,255,0.25)",marginTop:5,letterSpacing:"0.03em"}}>{predCount}/{totalCats} predictions submitted</div>
              </div>
            </div>
          </div>
        );
      })}
      <div style={{textAlign:"center",padding:"18px",color:"rgba(255,255,255,0.2)",fontSize:11}}>Live updates via Firebase · auto-synced</div>
    </div>
  );
}

function StatsView({ winners, allPreds, categories, users }) {
  const [tab, setTab] = useState("films");
  const filmNoms={}, filmWins={};
  categories.forEach(cat => {
    cat.nominees.forEach(nom => { const f=getFilm(cat.id,nom); filmNoms[f]=(filmNoms[f]||0)+1; });
    if (winners[cat.id]) { const f=getFilm(cat.id,winners[cat.id]); filmWins[f]=(filmWins[f]||0)+1; }
  });
  const maxNoms = Math.max(...Object.values(filmNoms),1);
  const films = Object.keys(filmNoms).sort((a,b)=>(filmWins[b]||0)-(filmWins[a]||0)||filmNoms[b]-filmNoms[a]).slice(0,18);

  const catStats = categories.map(cat => {
    if (!winners[cat.id]) return null;
    const correct = users.filter(u => (allPreds[u.nickname]||{})[cat.id]===winners[cat.id]).length;
    return { cat, correct, total:users.length, winner:winners[cat.id] };

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

                <div style={{width:`${(filmNoms[film]/maxNoms)*100}%`,height:"100%",background:filmWins[film]?`linear-gradient(90deg, ${GOLD}, ${GOLD2})`:"#2a2a3e",borderRadius:4}} />

          {Object.keys(winners).length===0 && <div style={{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,0.25)",fontSize:13}}>Film wins appear as the ceremony progresses</div>}

                  <div style={{textAlign:"right",marginLeft:12}}>
                    <div style={{fontSize:22,fontWeight:700,color:col,fontFamily:"'Cormorant Garamond', serif",lineHeight:1}}>{pct}%</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>{correct}/{total} got it</div>

                </div>

            );

        </div>
      )}
    {/*   {tab==="consensus" && (
        <div style={{padding:"6px 14px"}}>
          <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",padding:"4px 2px 10px",letterSpacing:"0.04em"}}>WHAT YOUR GROUP IS PICKING</div>
          {popularPicks.length===0 && <div style={{textAlign:"center",padding:"40px 20px",color:"rgba(255,255,255,0.25)",fontSize:13}}>Appears once players submit predictions</div>}

              <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:6,letterSpacing:"0.04em"}}>{cat.emoji} {cat.name.toUpperCase()}</div>

          ))}

      )} */}
    </div>
  );

// ADMIN VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function AdminView({ categories, winners, onMark, onRenameUser, onDeleteUser, myNick, users, allPreds, historyData, year }) {
  const [tab, setTab] = useState("winners");
  const [saved, setSaved] = useState(false);
  const [renamingUser, setRenamingUser] = useState(null);
  const [newNick, setNewNick] = useState("");
  const [newPinVal, setNewPinVal] = useState("");
  const [renameError, setRenameError] = useState("");
  const [renameLoading, setRenameLoading] = useState(false);
  const [deletingUser, setDeletingUser] = useState(null);
  const [deleteLoading, setDeleteLoading] = useState(false);

  const doDelete = async () => {
    setDeleteLoading(true);
    await onDeleteUser(deletingUser.nickname);
    setDeletingUser(null);
    setDeleteLoading(false);
  };

  const doRename = async () => {
    if (!newNick.trim()) { setRenameError("Enter a new nickname"); return; }
    if (newPinVal.length < 4) { setRenameError("PIN must be at least 4 digits"); return; }
    setRenameLoading(true);
    setRenameError("");
    try {
      await onRenameUser(renamingUser.nickname, newNick.trim(), newPinVal);
      setRenamingUser(null);
    } catch(e) {
      setRenameError(e.message || "Rename failed");
    }
    setRenameLoading(false);
  };

  const saveToHistory = async () => {
    const scores = users.map(u => ({
      nickname: u.nickname,
      score: Object.entries(winners).filter(([c,w]) => (allPreds[u.nickname]||{})[c]===w).length
    }));
    const entry = { year, winners, scores, savedAt: new Date().toISOString() };
    const existing = (historyData||[]).filter(h=>h.year!==year);
    await st.set("osc_history", [...existing, entry]);
    setSaved(true); setTimeout(()=>setSaved(false),3000);
  };

  const ts=(t)=>({padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter', sans-serif",letterSpacing:"0.04em",background:tab===t?`linear-gradient(135deg, ${GOLD}, #a07828)`:"rgba(255,255,255,0.06)",color:tab===t?"#07070f":"rgba(255,255,255,0.4)",transition:"all 0.2s"});

  return (
    <div>
      <div style={{padding:"12px 14px 8px",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        <button style={ts("winners")} onClick={()=>setTab("winners")}>Mark Winners</button>
        <button style={ts("members")} onClick={()=>setTab("members")}>Members</button>
        <button onClick={saveToHistory}
          style={{marginLeft:"auto",padding:"8px 14px",borderRadius:8,border:"none",cursor:"pointer",background:saved?"rgba(107,232,154,0.2)":"rgba(107,232,154,0.1)",color:saved?"#6be89a":"rgba(107,232,154,0.6)",fontWeight:600,fontSize:12,fontFamily:"'Inter', sans-serif",transition:"all 0.3s"}}>
          {saved?"✓ Saved!":"📅 Save Year"}
        </button>
      </div>
      <div style={{padding:"2px 16px 8px",fontSize:11,color:"rgba(255,255,255,0.25)",letterSpacing:"0.04em"}}>
        {Object.keys(winners).length}/{categories.length} WINNERS MARKED · TAP WINNER TO TOGGLE
      </div>

      {tab==="winners" && categories.map(cat => (
        <div key={cat.id} style={{margin:"6px 14px",background:CARD2,borderRadius:14,border:`1px solid ${BORDER}`,overflow:"hidden"}}>
          <div style={{padding:"10px 14px 8px",display:"flex",alignItems:"center",gap:8}}>
            <span>{cat.emoji}</span>
            <span style={{fontSize:14,fontWeight:600,color:GOLD,fontFamily:"'Cormorant Garamond', serif",letterSpacing:"0.02em"}}>{cat.name}</span>
            {winners[cat.id] && <span style={{marginLeft:"auto",fontSize:10,color:"#6be89a",fontWeight:600}}>✓ SET</span>}
          </div>
          <div style={{padding:"0 10px 10px",display:"flex",flexDirection:"column",gap:5}}>
            {cat.nominees.map(nom => {
              const isWinner=winners[cat.id]===nom;
              const pickCount=users.filter(u=>(allPreds[u.nickname]||{})[cat.id]===nom).length;
              return (
                <button key={nom} onClick={()=>onMark(cat.id,isWinner?null:nom)}
                  style={{background:isWinner?"rgba(201,168,76,0.15)":"rgba(255,255,255,0.03)",border:`1px solid ${isWinner?"rgba(201,168,76,0.45)":"rgba(255,255,255,0.07)"}`,borderRadius:9,padding:"9px 12px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"all 0.15s"}}>
                  <span style={{fontSize:16,flexShrink:0}}>{isWinner?"🏆":"○"}</span>
                  <span style={{fontSize:13,color:isWinner?"#fff":"rgba(255,255,255,0.5)",fontWeight:isWinner?600:400,flex:1}}>{nom}</span>
                  {pickCount>0 && <span style={{fontSize:10,color:isWinner?GOLD:"rgba(255,255,255,0.25)",fontWeight:600}}>{pickCount} picked</span>}
                </button>
              );
            })}
          </div>
        </div>
      ))}

      {tab==="members" && (
        <div style={{padding:"0 14px"}}>
          {users.map(u => {
            const predCount=Object.keys(allPreds[u.nickname]||{}).length;
            const score=Object.entries(winners).filter(([c,w])=>(allPreds[u.nickname]||{})[c]===w).length;
            return (
              <div key={u.nickname} style={{background:CARD2,borderRadius:12,padding:"13px 16px",marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center",border:"1px solid rgba(255,255,255,0.05)"}}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14}}>{u.nickname} {u.isAdmin?"👑":""}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:3}}>{predCount}/{CATEGORIES.length} predictions</div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <button onClick={()=>{ setRenamingUser(u); setNewNick(u.nickname); setNewPinVal(""); setRenameError(""); }}
                    style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"6px 10px",color:"rgba(255,255,255,0.45)",cursor:"pointer",fontSize:13,lineHeight:1}}>
                    ✏️
                  </button>
                  {u.nickname !== myNick && (
                    <button onClick={()=>setDeletingUser(u)}
                      style={{background:"rgba(220,50,50,0.08)",border:"1px solid rgba(220,50,50,0.2)",borderRadius:8,padding:"6px 10px",color:"rgba(255,100,100,0.55)",cursor:"pointer",fontSize:13,lineHeight:1}}>
                      🗑️
                    </button>
                  )}
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:18,fontWeight:700,color:GOLD,fontFamily:"'Cormorant Garamond', serif"}}>{score}</div>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>correct</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {deletingUser && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}} onClick={()=>setDeletingUser(null)}>
          <div style={{background:"#161628",borderRadius:16,padding:"24px",width:"100%",maxWidth:340,border:"1px solid rgba(220,50,50,0.3)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:18,fontWeight:700,color:"#ff7070",fontFamily:"'Cormorant Garamond', serif",marginBottom:8}}>Delete Player?</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.5)",lineHeight:1.6,marginBottom:20}}>This will permanently remove <span style={{color:"#fff",fontWeight:600}}>{deletingUser.nickname}</span> and all their predictions. This cannot be undone.</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setDeletingUser(null)} style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"rgba(255,255,255,0.4)",cursor:"pointer",fontFamily:"'Inter', sans-serif",fontWeight:500,fontSize:14}}>Cancel</button>
              <button onClick={doDelete} disabled={deleteLoading} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:"linear-gradient(135deg, #c0392b, #8b1a1a)",color:"#fff",cursor:"pointer",fontWeight:700,fontFamily:"'Inter', sans-serif",fontSize:14,opacity:deleteLoading?0.7:1}}>
                {deleteLoading?"…":"Delete"}
              </button>
            </div>
          </div>
        </div>
      )}

      {renamingUser && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 24px"}} onClick={()=>setRenamingUser(null)}>
          <div style={{background:"#161628",borderRadius:16,padding:"24px",width:"100%",maxWidth:340,border:`1px solid ${BORDER}`}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:18,fontWeight:700,color:GOLD,fontFamily:"'Cormorant Garamond', serif",marginBottom:4}}>Rename Player</div>
            <div style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:18}}>Currently: <span style={{color:"rgba(255,255,255,0.65)",fontWeight:600}}>{renamingUser.nickname}</span></div>
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              <input style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"13px 16px",fontSize:15,color:"#fff",width:"100%",fontFamily:"'Inter', sans-serif"}} placeholder="New nickname" value={newNick} onChange={e=>setNewNick(e.target.value)} />
              <input style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"13px 16px",fontSize:15,color:"#fff",width:"100%",fontFamily:"'Inter', sans-serif"}} placeholder="New PIN (4+ digits)" type="password" inputMode="numeric" maxLength={8} value={newPinVal} onChange={e=>setNewPinVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&doRename()} />
              {renameError && <div style={{color:"#ff8080",fontSize:12,textAlign:"center"}}>{renameError}</div>}
              <div style={{display:"flex",gap:8,marginTop:6}}>
                <button onClick={()=>setRenamingUser(null)} style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid rgba(255,255,255,0.12)",background:"transparent",color:"rgba(255,255,255,0.4)",cursor:"pointer",fontFamily:"'Inter', sans-serif",fontWeight:500,fontSize:14}}>Cancel</button>
                <button onClick={doRename} disabled={renameLoading} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:`linear-gradient(135deg, ${GOLD}, #a07828)`,color:"#070710",cursor:"pointer",fontWeight:700,fontFamily:"'Cormorant Garamond', serif",letterSpacing:"0.05em",fontSize:15,opacity:renameLoading?0.7:1}}>
                  {renameLoading?"…":"Save"}
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// AWARDS VIEW  (My Card + Badges)
// ═══════════════════════════════════════════════════════════════════════════════
function AwardsView({ myNick, users, allPreds, winners, categories }) {
  const [tab, setTab] = useState("card");
  const totalWinners = Object.keys(winners).length;
  const myPreds = allPreds[myNick] || {};
  const myScore = Object.entries(winners).filter(([c,w]) => myPreds[c]===w).length;
  const pct = totalWinners>0 ? Math.round((myScore/totalWinners)*100) : 0;

  const ts=(t)=>({padding:"8px 16px",borderRadius:8,border:"none",cursor:"pointer",fontWeight:600,fontSize:12,fontFamily:"'Inter', sans-serif",letterSpacing:"0.04em",background:tab===t?`linear-gradient(135deg, ${GOLD}, #a07828)`:"rgba(255,255,255,0.06)",color:tab===t?"#07070f":"rgba(255,255,255,0.4)",transition:"all 0.2s"});

  const userAchievements = users.map(u => ({
    user: u,
    badges: ACHIEVEMENTS.filter(a => a.check(u.nickname, allPreds, winners, users, categories))
  }));

  return (
    <div>
      <div style={{padding:"12px 14px 8px",display:"flex",gap:6}}>
        <button style={ts("card")} onClick={()=>setTab("card")}>🃏 My Card</button>
        <button style={ts("badges")} onClick={()=>setTab("badges")}>🏅 Badges</button>
      </div>

      {tab==="card" && (
        <div style={{padding:"0 14px"}}>
          <div style={{background:"linear-gradient(135deg, #1a1330, #0e1628)",borderRadius:16,padding:"24px 20px",marginBottom:12,border:`1px solid ${BORDER}`,textAlign:"center"}}>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",letterSpacing:"0.15em",marginBottom:8}}>OSCARS 2026 · YOUR WRAP</div>
            <div style={{fontSize:34,fontWeight:700,color:GOLD,fontFamily:"'Cormorant Garamond', serif",lineHeight:1}}>{myNick}</div>
            <div style={{width:40,height:1,background:`linear-gradient(90deg, transparent, ${GOLD}, transparent)`,margin:"12px auto"}} />
            <div style={{fontSize:58,fontWeight:700,color:GOLD,fontFamily:"'Cormorant Garamond', serif",lineHeight:1}}>{myScore}</div>
            <div style={{fontSize:13,color:"rgba(255,255,255,0.4)",marginTop:4}}>/{totalWinners} correct · {pct}%</div>
            <div style={{marginTop:14,height:4,background:"rgba(255,255,255,0.06)",borderRadius:6,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:`linear-gradient(90deg, ${GOLD}, #6be89a)`,borderRadius:6,transition:"width 0.6s ease"}} />
            </div>
            {totalWinners===0 && <div style={{fontSize:11,color:"rgba(255,255,255,0.2)",marginTop:10}}>Your card fills in as winners are announced</div>}
          </div>

          {categories.map(cat => {
            const myPick=myPreds[cat.id], winner=winners[cat.id];
            const correct=myPick&&winner&&myPick===winner;
            const wrong=myPick&&winner&&myPick!==winner;
            return (
              <div key={cat.id} style={{background:CARD2,borderRadius:10,padding:"10px 13px",marginBottom:5,border:`1px solid ${correct?"rgba(107,232,154,0.2)":wrong?"rgba(255,100,100,0.1)":"rgba(255,255,255,0.04)"}`}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",letterSpacing:"0.05em",marginBottom:4}}>{cat.emoji} {cat.name.toUpperCase()}</div>
                {myPick ? (
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:13,color:correct?"#6be89a":wrong?"#ff7070":"rgba(255,255,255,0.5)",fontWeight:(correct||wrong)?600:400,flex:1,lineHeight:1.35}}>{myPick}</span>
                      <span style={{fontSize:15,flexShrink:0}}>{correct?"✓":wrong?"✗":"·"}</span>
                    </div>
                    {wrong&&winner&&<div style={{fontSize:11,color:GOLD,marginTop:3}}>🏆 {winner}</div>}
                  </div>
                ) : (
                  <div style={{fontSize:13,color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>No prediction submitted</div>
                )}
              </div>
            );
          })}
          <div style={{height:16}} />
        </div>
      )}

      {tab==="badges" && (
        <div style={{padding:"0 14px"}}>
          {totalWinners<5 && (
            <div style={{textAlign:"center",padding:"20px",background:CARD2,borderRadius:12,marginBottom:12,border:`1px solid ${BORDER}`}}>
              <div style={{fontSize:36}}>🏅</div>
              <div style={{fontSize:13,color:"rgba(255,255,255,0.3)",marginTop:8,lineHeight:1.6}}>Badges unlock as winners are announced.<br/>Check back during the ceremony!</div>
            </div>
          )}
          {userAchievements.map(({user,badges}) => (
            <div key={user.nickname} style={{background:CARD2,borderRadius:12,padding:"13px 14px",marginBottom:8,border:`1px solid ${user.nickname===myNick?"rgba(201,168,76,0.2)":"rgba(255,255,255,0.05)"}`}}>
              <div style={{fontSize:13,fontWeight:600,color:user.nickname===myNick?GOLD:"#e8e8e8",marginBottom:badges.length?10:4}}>
                {user.nickname}{user.nickname===myNick?" (you)":""}{user.isAdmin?" 👑":""}
              </div>
              {badges.length>0 ? (
                <div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {badges.map(badge => (
                    <div key={badge.id} style={{display:"flex",alignItems:"flex-start",gap:10,background:"rgba(255,255,255,0.03)",borderRadius:8,padding:"8px 10px"}}>
                      <span style={{fontSize:22,lineHeight:1,flexShrink:0}}>{badge.icon}</span>
                      <div>
                        <div style={{fontSize:12,fontWeight:600,color:GOLD2}}>{badge.name}</div>
                        <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:2,lineHeight:1.4}}>{badge.desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontStyle:"italic"}}>
                  {totalWinners>=5?"No badges earned yet":""}
                </div>
              )}
            </div>
          ))}
          <div style={{height:16}} />
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// HISTORY VIEW
// ═══════════════════════════════════════════════════════════════════════════════
function HistoryView({ historyData, onDeleteYear }) {
  const MEDALS = ["🥇","🥈","🥉"];
  const [confirmYear, setConfirmYear] = React.useState(null);

  const doDelete = async (yr) => {
    await onDeleteYear(yr);
    setConfirmYear(null);
  };
  if (!historyData?.length) return (
    <div style={{textAlign:"center",padding:"70px 24px",color:"rgba(255,255,255,0.25)"}}>
      <div style={{fontSize:52}}>📅</div>
      <div style={{marginTop:18,fontSize:15,fontFamily:"'Cormorant Garamond', serif",color:"rgba(255,255,255,0.35)"}}>No history yet</div>
      <div style={{marginTop:8,fontSize:12,lineHeight:1.7}}>After each ceremony, the admin saves results.<br/>They'll appear here every year.</div>
    </div>
  );
  return (
    <div style={{padding:"10px 14px"}}>
      {[...historyData].reverse().map(entry => {
        const sorted=[...entry.scores].sort((a,b)=>b.score-a.score);
        const total=Object.keys(entry.winners||{}).length;
        return (
          <div key={entry.year} style={{background:CARD2,borderRadius:16,padding:"18px",marginBottom:14,border:`1px solid ${BORDER}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:22,fontWeight:700,color:GOLD,fontFamily:"'Cormorant Garamond', serif"}}>🏆 Oscars {entry.year}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.3)"}}>{new Date(entry.savedAt).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
                {onDeleteYear && (
                  confirmYear === entry.year
                    ? <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <span style={{fontSize:11,color:"rgba(255,100,100,0.7)"}}>Remove?</span>
                        <button onClick={()=>doDelete(entry.year)} style={{background:"rgba(200,40,40,0.2)",border:"1px solid rgba(200,40,40,0.4)",borderRadius:6,padding:"3px 9px",color:"#ff8080",cursor:"pointer",fontSize:11,fontWeight:600}}>Yes</button>
                        <button onClick={()=>setConfirmYear(null)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"3px 9px",color:"rgba(255,255,255,0.35)",cursor:"pointer",fontSize:11}}>No</button>
                      </div>
                    : <button onClick={()=>setConfirmYear(entry.year)} style={{background:"rgba(200,40,40,0.07)",border:"1px solid rgba(200,40,40,0.15)",borderRadius:6,padding:"4px 8px",color:"rgba(255,100,100,0.4)",cursor:"pointer",fontSize:12,lineHeight:1}}>🗑️</button>
                )}
              </div>
            </div>
            {sorted.map((s,i) => (
              <div key={s.nickname} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:i<sorted.length-1?"1px solid rgba(255,255,255,0.05)":"none",gap:12}}>
                <span style={{width:28,fontSize:i<3?20:13,textAlign:"center",color:i>=3?"rgba(255,255,255,0.3)":undefined,fontWeight:700}}>{i<3?MEDALS[i]:`${i+1}.`}</span>
                <span style={{flex:1,fontWeight:i===0?700:400,color:i===0?GOLD:"rgba(255,255,255,0.7)",fontSize:14}}>{s.nickname}</span>
                <span style={{color:GOLD,fontWeight:700,fontFamily:"'Cormorant Garamond', serif",fontSize:17}}>
                  {s.score}<span style={{color:"rgba(255,255,255,0.25)",fontFamily:"'Inter'",fontWeight:400,fontSize:11}}>/{total}</span>
                </span>
                <span style={{fontSize:11,color:"rgba(255,255,255,0.3)",width:35,textAlign:"right"}}>{total>0?Math.round((s.score/total)*100):0}%</span>
              </div>
            ))}
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
